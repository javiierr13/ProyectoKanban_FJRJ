<div class="modal-overlay">
  <div class="modal-content">
    <h2>Nueva Tarea</h2>
    <form (ngSubmit)="alEnviar()">
      <div class="form-group">
        <label>Título</label>
        <input type="text" [(ngModel)]="titulo" name="titulo" required placeholder="¿Qué hay que hacer?">
      </div>
      <div class="form-group">
        <label>Descripción</label>
        <textarea [(ngModel)]="descripcion" name="descripcion" required rows="3"></textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Horas estimadas</label>
          <input type="number" [(ngModel)]="estimacionHoras" name="horas" min="1">
        </div>
        <div class="form-group">
          <label>Asignar a</label>
          <select [(ngModel)]="idUsuarioAsignado" name="usuario" required>
            @for (usuario of usuarios; track usuario.id) {
              <option [value]="usuario.id">{{ usuario.nombre }} {{ usuario.apellidos }}</option>
            }
          </select>
        </div>
      </div>
      <div class="modal-actions">
        <button type="button" class="btn-cancel" (click)="cancelar()">Cancelar</button>
        <button type="submit" class="btn-save">Crear Tarea</button>
      </div>
    </form>
  </div>
</div>
